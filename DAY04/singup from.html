<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up Form</title>
    <link rel="icon" href="hello.jpeg">
  <link  rel="stylesheet" href="Sign Up.css">
</head>
<body>

    <div class="box">
        <form id="signupForm">
            <h1>Sign Up Form</h1>

            <div class="input-group">
                <label for="first">Username</label>
                <input type="text" id="first" name="username" placeholder="Enter Username" required>
            </div>

            <div class="input-group">
                <label for="second">Email</label>
                <input type="email" id="second" name="email" placeholder="Enter Email" required>
            </div>

            <div class="input-group">
                <label for="third">Password</label>
                <input type="password" id="third" name="password" placeholder="Enter Password" required>
            </div>

            <div class="input-group">
                <label for="forth">Confirm Password</label>
                <input type="password" id="forth" name="confirmPassword" placeholder="Confirm Password" required>
            </div>

            <button style="width: 100%; height: 40px; font-size: 20px; padding: 5px; background-color: rgb(138, 138, 242);; color: white; font-weight: 600;">Login</button>
        
        </form>
    </div>

</body>
</html>
