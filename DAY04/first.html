<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <link rel="icon" href="hello.jpeg">
    <link rel="stylesheet" href="styler.css">

</head>
<body>

<div class="box">
    <form id="loginForm">
        <h1>Login</h1>

        <div>
            <label for="first">Username</label>
            <input type="text" id="first" placeholder="Enter Username">
        </div>

        <div>
            <label for="second">Password</label>
            <input type="password" id="second" placeholder="Enter Password">
        </div>

        <button style="width: 100%; height: 40px; font-size: 20px; padding: 5px; background-color: rgb(138, 138, 242);; color: white; font-weight: 600;">Login</button>
        
    </form>
</div>

<script src="script.js"></script>
</body>
</html>
